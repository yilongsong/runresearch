experiments:
  - name: "baseline_resnet"
    command: "echo 'Training ResNet for 100 epochs...' && sleep 10 && echo 'Done'"
    working_dir: "."
    resources:
      gpus: 1

  - name: "baseline_vit"
    command: "echo 'Training ViT...' && sleep 5 && exit 1"
    resume_command: "echo 'Resuming ViT...' && sleep 10 && exit 0"
    working_dir: "."
    resources:
      gpus: 2


